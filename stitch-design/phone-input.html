<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<!-- Top AppBar (Simplified for Onboarding) -->
<header class="w-full max-w-container-max flex items-center h-16 px-margin-page bg-surface">
<button aria-label="Назад" class="p-2 -ml-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
</header>
<main class="w-full max-w-container-max flex flex-col flex-grow px-margin-page">
<!-- Content Canvas -->
<div class="mt-8 mb-stack-section">
<h1 class="font-headline-xl text-headline-xl text-on-surface">Регистрация</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-stack-label">
                Введите ваш номер телефона для входа или регистрации
            </p>
</div>
<!-- Phone Input Section -->
<div class="space-y-stack-element">
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-stack-label px-1" for="phone">
                    Номер телефона
                </label>
<div class="flex items-center gap-2">
<!-- Country Selector -->
<div class="relative flex items-center justify-between px-3 h-14 bg-surface-container-lowest border border-input-border rounded-xl min-w-[90px] cursor-pointer hover:border-primary transition-colors">
<div class="flex items-center gap-2">
<div class="w-6 h-4 overflow-hidden rounded-sm relative">
<img alt="Kazakhstan Flag" class="w-full h-full object-cover" data-alt="A macro close-up of a high-quality fabric national flag of Kazakhstan, showing the bright blue background and golden eagle and sun. The lighting is soft and studio-quality, emphasizing the professional and reliable fintech aesthetic. The colors are vibrant yet sophisticated, aligning with a premium corporate financial app interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBiLgKkXBnnrdlZoXyP6C1tg8etAOQstVmkeSoNQV73ZtR_zOhiIW5FXFIOOku099M7AlfZ7t9AAab9JbDshAOgYQwCESkngNVAlPNMOnqvMtHpwH9EWjQOF_D-A_16Ri5aQ_9YQGU3OKwZ-8xu2iOb615YFW-BPl46lkKd0ljS2D0Y7GabRMNYYb_iw7mNqr_OKpNSqpF664Us99zRh0bnNcybWJl3VWLP5aFirajL6BU4DkMeW-aBh2lGUVEgkV4ibAl0x2TVG_K"/>
</div>
<span class="font-body-lg text-body-lg">+7</span>
</div>
<span class="material-symbols-outlined text-sm text-outline">expand_more</span>
</div>
<!-- Input Field -->
<div class="relative flex-grow">
<input class="w-full h-14 px-4 bg-surface-container-lowest border border-input-border rounded-xl font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-text-dim" id="phone" placeholder="700 000 00 00" type="tel"/>
</div>
</div>
</div>
<!-- Verification Info Card -->
<div class="bg-surface-container-low p-5 rounded-xl border border-outline-variant/30 flex gap-4">
<div class="flex-shrink-0">
<span class="material-symbols-outlined text-primary">security</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface text-sm mb-1">Безопасный вход</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        Мы отправим SMS-код для подтверждения вашего номера. Это займет всего несколько секунд.
                    </p>
</div>
</div>
</div>
<!-- Spacer for push-to-bottom layout -->
<div class="flex-grow"></div>
<!-- Footer / Primary Action -->
<div class="py-10 flex flex-col items-center w-full">
<button class="w-full h-14 bg-primary text-on-primary font-body-lg font-bold rounded-xl shadow-[0_10px_20px_-5px_rgba(0,74,198,0.3)] active:scale-[0.98] transition-all duration-150 hover:bg-on-primary-fixed-variant" onclick="window.location.reload()">
                Продолжить
            </button>
<p class="mt-6 font-body-sm text-body-sm text-center text-text-muted px-4">
                Продолжая, вы соглашаетесь с <a class="text-primary hover:underline font-semibold" href="#">Условиями использования</a> и <a class="text-primary hover:underline font-semibold" href="#">Политикой конфиденциальности</a>
</p>
</div>
</main>
<script>
        // Simple input mask visual aid logic
        const phoneInput = document.getElementById('phone');
        
        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 10) value = value.slice(0, 10);
            
            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i === 3 || i === 6 || i === 8) formatted += ' ';
                formatted += value[i];
            }
            e.target.value = formatted;
        });

        // Feedback on interaction
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                // Mimic feedback
                console.log('Action triggered');
            });
        });
    </script>
